<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Denis Doiron — Senior SAP Business One delivery for partners</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/shared.jsx"></script>
  <script type="text/babel" src="components/home.jsx"></script>
  <script type="text/babel" src="components/services.jsx"></script>
  <script type="text/babel" src="components/experience.jsx"></script>
  <script type="text/babel" src="components/contact.jsx"></script>

  <script type="text/babel">
    const { useEffect: AuE } = React;

    function App() {
      const route = useRoute();

      // Keep document title in sync with route for feel of real site
      AuE(() => {
        const titles = {
          '/': 'Denis Doiron — SAP Business One delivery for partners',
          '/services': 'Services — Denis Doiron',
          '/experience': 'Experience — Denis Doiron',
          '/contact': 'Contact — Denis Doiron',
        };
        document.title = titles[route] || titles['/'];
      }, [route]);

      let Page;
      if (route === '/services') Page = ServicesPage;
      else if (route === '/experience') Page = ExperiencePage;
      else if (route === '/contact') Page = ContactPage;
      else Page = Home;

      return (
        <>
          <Nav route={route} />
          <main key={route} data-screen-label={route}>
            <Page />
          </main>
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
